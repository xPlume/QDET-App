{% extends "base.html" %}
{% load static %}


{% block header %}
	
	<!-- Hero Header -->
	<div class="py-5 bg-dark hero-header mb-5">
		<img src="{% static 'img/bg-hero.webp' %}" alt="Hero background" fetchpriority="high">
		<div class="container hero-content text-center my-2 pt-5 pb-4">
			<h1 class="display-3 text-white mb-3 animated fadeInDown roboto-font">Login</h1>
			<nav aria-label="breadcrumb">
			<ol class="breadcrumb justify-content-center">
				<li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
				<li class="breadcrumb-item text-white active" aria-current="page">Login</li>
			</ol>
			</nav>
		</div>
	</div>
	
{% endblock %}



{% block content %}
	
	
	<form method="post" class="mb-3">
		
		
		{% csrf_token %}
		<div class="container">
			
			<!-- User name -->
			<div class="row d-flex justify-content-center">	
				<div class="form-floating col-md-8 col-lg-6 mb-3">
					<input required name="username" type="text" placeholder="Username" class="form-control">
					<label class="ms-3" for="floatingInput">Email or Username</label>
				</div>
			</div>
			
			
			<!-- Password -->
			<div class="row d-flex justify-content-center">
				<div class="form-floating col-md-8 col-lg-6 mb-3">
					<input required name="password" type="password" placeholder="Enter your password" class="form-control" autocomplete="off">
					<label class="ms-3" for="floatingInput">Password</label>
					<!-- Forgot Password text -->
					<small class="form-text text-muted">Forgot your password? <a href="{% url 'password_reset' %}">Reset your password here</a></small>
				</div>
			</div>
			
			
			
			
			<!-- Login button -->
			<div class="row d-flex justify-content-center">
				<div class="col-md-8 col-lg-6 mt-3">
					<button type="submit" class="btn btn-lg btn-outline-primary w-100">Login</button>
				</div>
			</div>
			
			
			<!-- Register text -->
			<p class="my-4 text-center">Don't have an account yet? <a href="{% url 'register' %}">Register</a> </p>
			
			
			
			
		</div>
		
		
		
	</form>
	
	
{% endblock content %}
