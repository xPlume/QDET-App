{% extends "base.html" %}
{% load static %}


{% block header %}
	
	<!-- Hero Header -->
	<div class="py-5 bg-dark hero-header mb-5">
		<img src="{% static 'img/bg-hero.webp' %}" alt="Hero background" fetchpriority="high">
		<div class="container hero-content text-center my-2 pt-5 pb-4">
			<h1 class="display-3 text-white mb-3 animated fadeInDown roboto-font">Password Reset</h1>
			<nav aria-label="breadcrumb">
			<ol class="breadcrumb justify-content-center">
				<li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
				<li class="breadcrumb-item"><a href="{% url 'login' %}">Login</a></li>
				<li class="breadcrumb-item text-white active" aria-current="page">Password Reset</li>
			</ol>
			</nav>
		</div>
	</div>
	
{% endblock %}



{% block content %}


<form method="post">
    {% csrf_token %}
	
	<div class="container">
		
		<h2 class="row d-flex justify-content-center mb-4">Input your email to reset your password</h2>
		
		<!-- Email -->
		<div class="row d-flex justify-content-center">	
			<div class="form-floating col-md-8 col-lg-6 mb-3">
				<input required name="email" type="email" placeholder="Input your email" id="id_email" class="form-control">
				<label class="ms-3" for="floatingInput">Email</label>
			</div>
		</div>
		
		
		<!-- Send Email button -->
		<div class="row d-flex justify-content-center">
			<div class="col-md-8 col-lg-6 mt-3">
				<button type="submit" class="btn btn-lg btn-outline-primary w-100">Reset password</button>
			</div>
		</div>
		
	
	</div>
	
</form>


{% endblock %}
