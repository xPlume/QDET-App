{% extends "base.html" %}
{% load static %}


{% block head_block %}
	
	<meta name="description" content="">
	
{% endblock %}



{% block header %}
	
	
	
{% endblock %}




{% block content %}
	
	
	<div class="mt-4"></div>
	
	<!-- Form start -->
	<form method="POST" enctype="multipart/form-data">
		{% csrf_token %}
		
		<div class="container">
			
			<legend class="mb-2">Creating a new question</legend>
			
			<!-- Question -->
			<div class="form-floating mb-3">
				<input required name="question" type="text" placeholder="Question" class="form-control">
				<label class="ps-4" for="floatingInput">Question</label>
			</div>
			
			
			
			<!-- Answer(s) -->
			{{ answer_formset.management_form }}
			<label class="form-label mt-3">Answer(s)</label>
			
			<div class="px-4" id="answer-formset-container">
				
				{% for form in answer_formset %}
					<div class="formset-form mb-4 pb-2">
						
						{{ form.id }}
						
						<!-- Text Area -->
						<div class="mb-3">
							<label for="{{ form.answer.id_for_label }}" class="form-label answer-label">Answer</label>
							<textarea name="{{ form.answer.html_name }}" id="{{ form.answer.id_for_label }}" class="form-control" rows="3">{{ form.answer.value|default_if_none:"" }}</textarea>
						</div>
						
						<!-- Correct Answer -->
						<div class="form-check form-switch mt-2">
							<input class="form-check-input" name="{{ form.is_correct.html_name }}" id="{{ form.is_correct.id_for_label }}" type="checkbox" {% if form.is_correct.value %}checked{% endif %} style="transform: scale(1.2);">
							<label class="form-check-label" for="{{ form.is_correct.id_for_label }}">Set as Correct Answer</label>
						</div>
						
					</div>
				{% endfor %}
			</div>
			
			<!-- Button to add a new answer -->
			<div class="mt-3 px-4">
				<button type="button" class="btn btn-outline-primary" id="add-answer">Add More</button>
				<button type="button" class="btn btn-outline-danger" id="remove-answer">Remove</button>
			</div>
			
			
			<!-- Submit button -->
			<div class="container mb-5">
				<button type="submit" class="btn btn-lg btn-outline-primary mt-5">Save</button>
			</div>
			
		</div>
		
	</form>
	
	
	
	
	<!-- Add JavaScript to handle adding more forms -->
	<script>
	document.addEventListener('DOMContentLoaded', function () {
		const formContainer = document.getElementById('answer-formset-container');
		const addBtn = document.getElementById('add-answer');
		const removeBtn = document.getElementById('remove-answer');
		const totalForms = document.getElementById('id_answers-TOTAL_FORMS');
		
		let formNum = formContainer.children.length;
		
		// Making the Answer conter (Answer 1, Answer 2...) work
		function updateAnswerLabels() {
			document.querySelectorAll('#answer-formset-container .formset-form')
			.forEach((form, index) => {
				const label = form.querySelector('.answer-label');
				if (label) {
					label.textContent = `Answer ${index + 1}`;
				}
			});
		}
		
		// Adding a new answer box
		addBtn.addEventListener('click', function () {
			const newForm = formContainer.children[0].cloneNode(true);
			const formRegex = RegExp(`answers-(\\d+)-`, 'g');
			
			newForm.innerHTML = newForm.innerHTML.replace(formRegex, `answers-${formNum}-`);
			
			newForm.querySelectorAll('input, textarea').forEach(el => {
				if (el.type === 'checkbox') el.checked = false;
				else el.value = '';
			});
			
			formContainer.appendChild(newForm);
			totalForms.value = ++formNum;
			updateAnswerLabels();
		});
		
		
		// Removing an answer box
		removeBtn.addEventListener('click', function () {
			if (formNum > 1) {
			formContainer.removeChild(formContainer.lastElementChild);
			totalForms.value = --formNum;
			updateAnswerLabels();
			} else {
				alert("You need to keep at least one answer.");
			}
		});
		
		// Ensure correct numbering on initial load
		updateAnswerLabels();
	});
	</script>
	
{% endblock %}
