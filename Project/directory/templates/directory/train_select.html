{% extends "base.html" %}
{% load static %}


{% block head_block %}
	
	<meta name="description" content="">
	
{% endblock %}



{% block header %}
	
	<!-- Hero Header -->
	<div class="py-5 bg-dark hero-header mb-5">
		<img src="{% static 'img/bg-hero.webp' %}" alt="Hero background" fetchpriority="high">
		<div class="container hero-content text-center my-2 pt-5 pb-4">
			<h1 class="display-3 text-white mb-3 animated fadeInDown roboto-font">Train a model</h1>
			<nav aria-label="breadcrumb">
			<ol class="breadcrumb justify-content-center">
				<li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
				<li class="breadcrumb-item"><a href="{% url 'user_questions' %}">MCQs</a></li>
				<li class="breadcrumb-item text-white active" aria-current="page">Model Training</li>
			</ol>
			</nav>
		</div>
	</div>
	
{% endblock %}




{% block content %}
	
	
	
	
	
	<!-- Form start -->
	<form method="POST" enctype="multipart/form-data">
	{% csrf_token %}
		
		
		
		<div class="form-group">
        <label for="title_id">Project Title:</label>
        <input type="text" 
               name="title" 
               id="title_id" 
               value="{{ form.title.value|default:'' }}" 
               required>
        {% if form.title.errors %}
            <span style="color: red;">{{ form.title.errors }}</span>
        {% endif %}
    </div>

    <div class="form-group">
        <label for="public_id">Make Public?</label>
        <input type="checkbox" 
               name="public" 
               id="public_id" 
               {% if form.public.value %}checked{% endif %}>
    </div>
		
		
		
		<!-- Train model button-->
		<div class="text-center my-3">
			<button type="submit" class="btn btn-lg btn-outline-success">Train the model</button>
		</div>
	</form>
	
	
	
	
{% endblock %}
