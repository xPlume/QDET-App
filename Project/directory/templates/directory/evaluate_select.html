{% extends "base.html" %}
{% load static %}


{% block head_block %}
	
	<meta name="description" content="">
	
{% endblock %}



{% block header %}
	
	<!-- Hero Header -->
	<div class="py-5 bg-dark hero-header mb-5">
		<img src="{% static 'img/bg-hero.webp' %}" alt="Hero background" fetchpriority="high">
		<div class="container hero-content text-center my-2 pt-5 pb-4">
			<h1 class="display-3 text-white mb-3 animated fadeInDown roboto-font">Test your questions</h1>
			<nav aria-label="breadcrumb">
			<ol class="breadcrumb justify-content-center">
				<li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
				<li class="breadcrumb-item"><a href="{% url 'user_questions' %}">MCQs</a></li>
				<li class="breadcrumb-item text-white active" aria-current="page">Testing questions</li>
			</ol>
			</nav>
		</div>
	</div>
	
{% endblock %}




{% block content %}
	
	
	<!-- Form start -->
	<form method="POST" enctype="multipart/form-data">
	{% csrf_token %}
	
		<div class="container">
			
			<h4 class="">Select a trained model</h4>
			
			<!-- Select parameter-->
			<div class="mb-5">
				<label for="exampleSelect1" class="form-label"></label>
				<select name="param_selection" class="form-select form-select-lg" id="param_id">
					<option value="">----------------</option>
					{% for model in existing_models %}
						<option value="{{ model.id }}">{{ model.title }}</option>
					{% endfor %}
				</select>
			</div>
			
			
			
			
			
			<!-- Test questions button-->
			<div class="text-center my-3">
				<button type="submit" class="btn btn-lg btn-outline-success">Test the questions</button>
			</div>
			
		</div>
	</form>
	
	
	
	
{% endblock %}
