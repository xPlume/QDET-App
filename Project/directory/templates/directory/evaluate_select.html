{% extends "base.html" %}
{% load static %}


{% block head_block %}
	
	<meta name="description" content="">
	
{% endblock %}



{% block header %}
	
	<!-- Hero Header -->
	<div class="py-5 bg-dark hero-header mb-5">
		<img src="{% static 'img/bg-hero.webp' %}" alt="Hero background" fetchpriority="high">
		<div class="container hero-content text-center my-2 pt-5 pb-4">
			<h1 class="display-3 text-white mb-3 roboto-font">Evaluate your questions</h1>
			<nav aria-label="breadcrumb">
				<ol class="breadcrumb justify-content-center">
					<li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
					<li class="breadcrumb-item"><a href="{% url 'user_questions' %}">MCQs</a></li>
					<li class="breadcrumb-item text-white active" aria-current="page">Evaluate questions</li>
				</ol>
			</nav>
		</div>
	</div>
	
{% endblock %}




{% block content %}
	
	
	<!-- Form start -->
	<form method="POST" enctype="multipart/form-data" id="evaluate-form">
	{% csrf_token %}
	
		<div class="container">
			
			<h4 class="">Select a trained model</h4>
			
			<!-- Select parameter-->
			<div class="mb-5">
				<label for="exampleSelect1" class="form-label"></label>
				<select name="param_selection" class="form-select form-select-lg" id="param_id">
					<option value="">----------------</option>
					
					<!-- Group 1: User's Own Models -->
					{% if user_models %}
						<optgroup label="My Models">
							{% for model in user_models %}
								{% if model.public is True %}
									<option value="{{ model.id }}">[{{ model.get_parameter_display }}] {{ model.title }} -- PUBLIC MODEL</option>
								{% else %}
									<option value="{{ model.id }}">[{{ model.get_parameter_display }}] {{ model.title }}</option>
								{% endif %}
							{% endfor %}
						</optgroup>
					{% endif %}
					
					<!-- Group 2: Public Models -->
					{% if public_models %}
						<optgroup label="Public Models">
							{% for model in public_models %}
								<option value="{{ model.id }}" class="text-secondary">[{{ model.get_parameter_display }}] {{ model.title }}</option>
							{% endfor %}
						</optgroup>
					{% endif %}
					
				</select>
			</div>
			
			
			
			
			
			<!-- Test questions button-->
			<div class="text-center my-3">
				<button type="submit" class="btn btn-lg btn-outline-success">Evaluate the questions</button>
			</div>
			
		</div>
	</form>
	
	
	
	
	<!-- Initialising the spinner -->
	<div id="loader" class="loader-overlay">
		<div class="spinner-border text-primary" role="status" style="width: 3.5rem; height: 3.5rem;">
			<span class="visually-hidden">Loading...</span>
		</div>
		<div class="fs-5 fw-medium text-body">
			<p class="lead">Evaluating the MCQs...</p>
		<div>
	</div>
	
	<!-- JS to generate the spinner -->
	<script>
		document.getElementById('evaluate-form').addEventListener('submit', function(event) {
			const loader = document.getElementById('loader');
			loader.classList.add('active');
		});
	</script>
	
	
	
{% endblock %}
